<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ark Nova Statistics</title>
  <!--
    Static GitHub Pages entry point.

    Keep this file intentionally small: the reusable shell, router, navigation,
    page injection, and page-specific logic live in assets/js/*. The live app
    starts at the hashless Home page by default, but index.html must remain at the root of the
    served folder because GitHub Pages loads it for the site URL.
  -->
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;600;700&family=DM+Mono:wght@400;500&family=Nunito:wght@600;700&family=Inter:wght@400;500;600;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/app.css?v=20260705-2" />
</head>
<body>
  <div id="app"></div>
  <!-- Refreshed daily with both unfiltered Home datasets. Loading it before the
       app lets the first route paint populated fact tiles synchronously. -->
  <script src="https://storage.googleapis.com/ark-nova-stats-dashboard-cache/card-stats/home/defaults.js"></script>
  <script type="module" src="assets/js/app.js?v=20260705-3"></script>
</body>
</html>
